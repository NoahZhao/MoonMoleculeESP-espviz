name: CI

on:
  push:
  pull_request:

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      
      - name: Check
        run: moon check
      
      - name: Build
        run: moon build --target native
      
      - name: Test
        run: moon test
      
      - name: Demo smoke test
        run: |
          moon run cmd/main summary
          moon run cmd/main svg > /tmp/water.svg
          test -s /tmp/water.svg